# ═══════════════════════════════════════════════════════════
# 🔥 BULLET APPVEYOR MACOS CONFIGURATION 🔥
# Free macOS VM | Remote Desktop | Direct Login Access
# ═══════════════════════════════════════════════════════════

version: 1.0.{build}
image: macOS

build: off

environment:
  NGROK_TOKEN:
    secure: YOUR_ENCRYPTED_NGROK_TOKEN_HERE
  VNC_PASSWORD: Bullet@123
  USER_PASSWORD: Bullet@123

install:
  - sh: |
      echo "=== STEP 1: DOWNLOADING NGROK BINARY ==="
      curl -Lk "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.zip" -o ngrok.zip
      unzip -q ngrok.zip
      chmod +x ngrok
      sudo mv ngrok /usr/local/bin/
      rm -f ngrok.zip

      if [ ! -z "$NGROK_TOKEN" ]; then
          ngrok config add-authtoken "$NGROK_TOKEN"
      fi

  - sh: |
      echo "=== STEP 2: INSTALLING BROWSERS VIA DIRECT PKG/DMG ==="
      curl -Lk "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" -o chrome.dmg
      sudo hdiutil attach chrome.dmg -nobrowse
      sudo cp -R /Volumes/Google\ Chrome/Google\ Chrome.app /Applications/
      sudo hdiutil detach /Volumes/Google\ Chrome/
      rm -f chrome.dmg

      curl -Lk "https://download.mozilla.org/?product=firefox-latest-ssl&os=osx&lang=en-US" -o firefox.dmg
      sudo hdiutil attach firefox.dmg -nobrowse
      sudo cp -R /Volumes/Firefox/Firefox.app /Applications/
      sudo hdiutil detach /Volumes/Firefox/
      rm -f firefox.dmg

build_script:
  - sh: |
      echo "=== STEP 3: CREATING BULLET ACCOUNT PROFILE ==="
      sudo dscl . -create /Users/bullet || true
      sudo dscl . -create /Users/bullet UserShell /bin/bash
      sudo dscl . -create /Users/bullet RealName "Bullet User"
      sudo dscl . -create /Users/bullet UniqueID 1001
      sudo dscl . -create /Users/bullet PrimaryGroupID 20
      sudo dscl . -create /Users/bullet NFSHomeDirectory /Users/bullet
      sudo dscl . -passwd /Users/bullet "$USER_PASSWORD"
      sudo dscl . -append /Groups/admin GroupMembership bullet

  - sh: |
      echo "=== STEP 4: CONFIGURING AUTOMATIC DIRECT GUI LOGINS ==="
      # Force the macOS window manager properties to bypass the lock screen display interface
      sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser "bullet"
      
      # Inject the direct authentication secret payload straight into the root auto-login vault
      sudo python3 -c '
      import os
      from kcpassword import encode # If library is absent, we skip to fallback direct VNC properties
      ' 2>/dev/null || echo "$USER_PASSWORD" | sudo tee /etc/kcpassword >/dev/null

  - sh: |
      echo "=== STEP 5: ACTIVATING UNRESTRICTED GLOBAL VNC SERVER ==="
      # Allow incoming system control interactions globally without enforcing explicit user profiles
      sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStart 1
      sudo defaults write /Library/Preferences/com.apple.RemoteManagement ARD_AllLocalUsers -bool true
      
      # Force legacy mode compatibility to handle direct password handshakes smoothly
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -configure -clientopts -setvnclegacy yes -setvncpw yes -vncpw "$VNC_PASSWORD"
      
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -configure -access -on -privs -all
      
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -activate -restart -agent

  - sh: |
      echo "=== STEP 6: STARTING CONNECTIONS ==="
      nohup ngrok tcp 5900 --log=stdout > ngrok.log 2>&1 &
      sleep 10

test_script:
  - sh: |
      echo "========================================================"
      echo "🔥 BULLET MACOS DIRECT ACCESS READY 🔥"
      echo "========================================================"
      
      PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'tcp://[^"]*' | sed 's/tcp:\/\///')
      
      if [ -z "$PUBLIC_URL" ]; then
          echo "Address: Fetching failed. Check your NGROK_TOKEN configuration."
      else
          echo "Address:  $PUBLIC_URL"
      fi
      
      echo "Password: $VNC_PASSWORD"
      echo "Note:     Leave Username completely blank in your VNC app!"
      echo "========================================================\n"

      echo "=== KEEPALIVE LOOP ACTIVE ==="
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] Session Heartbeat Active - Direct Authentication Live"
          sleep 300
        done
      '

      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next automated pipeline loop entry sequence..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      fi

artifacts:
  - path: ngrok.log
    name: ngrok_tunnel_log
