version: 1.0.{build}

# Switch the operating system image to macOS
image: macOS

build: off

environment:
  # VNC requires a 6-to-8 character password
  VNC_PASS: "Bul2026!"

init:
  - sh: |
      echo "Configuring macOS Screen Sharing (VNC)..."
      # Turn on native macOS screen sharing/VNC capabilities
      sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStart 1
      
      # Set a secure access password for the VNC connection
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -configure -clientopts -setvncpasswd -vncpasswd $VNC_PASS
      
      # Activate the remote management agent service
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -activate -configure -access -on -privs -all -restart -agent

  - sh: |
      echo "Downloading and Configuring ngrok for Mac..."
      # Download the native macOS ARM/64 zip archive for ngrok
      curl -Lk "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.zip" -o ngrok.zip
      unzip ngrok.zip
      chmod +x ngrok
      sudo mv ngrok /usr/local/bin/
      rm ngrok.zip
      
      ngrok config add-authtoken $NGROK_AUTHTOKEN

test_script:
  - sh: |
      echo "Launching background ngrok VNC Tunnel..."
      # Port 5900 is the official default global port for VNC Screen Sharing
      ngrok tcp 5900 --log=stdout > /dev/null &
      sleep 7

      echo "Fetching macOS Connection Details..."
      PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'tcp://[^"]*')
      
      if [ -z "$PUBLIC_URL" ]; then
          echo "Error: Failed to retrieve ngrok tunnel link. Verify your NGROK_AUTHTOKEN."
          exit 1
      fi
      
      CLEAN_ADDRESS=$(echo $PUBLIC_URL | sed 's/tcp:\/\///')
      
      echo -e "\n=================================="
      echo "====== APPVEYOR MACOS ACCESS ====="
      echo "VNC Address: $CLEAN_ADDRESS"
      echo "VNC Password: $VNC_PASS"
      echo "==================================\n"

      # Maintain the current Mac machine container for 50 minutes
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] macOS Server Session Heartbeat Active"
          sleep 300
        done
      '

      # 24/7 Loop Action: Triggers the next sequential Mac build before this one finishes
      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next automated 24/7 Mac continuous build cycle..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      else
          echo "Notice: APPVEYOR_API_TOKEN missing. Skipping auto-rebuild loop."
      fi
