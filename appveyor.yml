version: 1.0.{build}

# Explicitly sets the build worker image to macOS
image: macOS

build: off

init:
  - sh: |
      echo "Downloading AnyDesk for macOS..."
      # Download the official stable AnyDesk production disk image
      curl -Lk "https://download.anydesk.com/desktop/anydesk.dmg" -o anydesk.dmg

      echo "Mounting installation image..."
      sudo hdiutil attach anydesk.dmg -nobrowse
      
      echo "Installing AnyDesk application into system directory..."
      sudo cp -R /Volumes/AnyDesk/AnyDesk.app /Applications/
      
      echo "Unmounting installation image..."
      sudo hdiutil detach /Volumes/AnyDesk
      rm anydesk.dmg

  - sh: |
      echo "Configuring unattended remote access..."
      # Setup unattended password execution natively through the AnyDesk binary context
      echo "Bul2026!" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password

      echo "Starting AnyDesk background service daemon..."
      # Run the application service engine in the background
      sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service &
      sleep 15

test_script:
  - sh: |
      echo "Retrieving unique AnyDesk Connection ID..."
      # Pull the system-assigned ID key from the application layer configuration
      ANYDESK_ID=$(sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
      
      if [ -z "$ANYDESK_ID" ] || [ "$ANYDESK_ID" == "0" ]; then
          echo "Retrying connection ID generation pass..."
          sleep 12
          ANYDESK_ID=$(sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id)
      fi

      echo -e "\n=========================================="
      echo "======= APPVEYOR ANYDESK ACCESS ========"
      echo " AnyDesk ID: $ANYDESK_ID"
      echo " Password:   Bul2026!"
      echo "==========================================\n"

      # Keep the active cloud container runtime open for 50 minutes
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] AnyDesk Connection Session Engine Active"
          sleep 300
        done
      '

      # Automatically chain-trigger the next continuous integration loop entry pass if token is saved
      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next automated pipeline loop entry sequence..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      else
          echo "Notice: APPVEYOR_API_TOKEN missing from Web Settings. Auto-looping skipped."
      fi
