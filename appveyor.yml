version: 1.0.{build}

# Explicitly sets the build worker image to macOS
image: macOS

build: off

init:
  - sh: |
      echo "Installing Independent VNC Server (TigerVNC)..."
      # Use Homebrew to install a standard standalone VNC server framework
      brew install tigervnc

      echo "Configuring standalone security password..."
      mkdir -p ~/.vnc
      
      # Inject the custom access password natively into the virtual frame configuration
      echo "Bul2026!" | vncpasswd -f > ~/.vnc/passwd
      chmod 600 ~/.vnc/passwd

      echo "Launching VNC display server context..."
      # Boot the standalone server on virtual port :1 (mapped natively to networking port 5901)
      vncserver :1 -geometry 1280x720 -localhost no

  - sh: |
      echo "Downloading and Configuring ngrok..."
      curl -Lk "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.zip" -o ngrok.zip
      unzip ngrok.zip
      chmod +x ngrok
      sudo mv ngrok /usr/local/bin/
      rm ngrok.zip
      
      if [ ! -z "$NGROK_AUTHTOKEN" ]; then
          ngrok config add-authtoken $NGROK_AUTHTOKEN
      else
          echo "Warning: NGROK_AUTHTOKEN variable is empty. Secure it inside Web Settings."
      fi

test_script:
  - sh: |
      echo "Launching background ngrok tunnel to TigerVNC display listener..."
      # Crucial: TigerVNC uses network port 5901 for display :1 instead of standard Apple 5900
      ngrok tcp 5901 --log=stdout > /dev/null &
      sleep 7

      echo "Fetching macOS Connection Details..."
      PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'tcp://[^"]*')
      
      if [ -z "$PUBLIC_URL" ]; then
          echo "Error: Failed to retrieve ngrok tunnel link. Verify your token configuration."
          exit 1
      fi
      
      CLEAN_ADDRESS=$(echo $PUBLIC_URL | sed 's/tcp:\/\///')
      
      echo -e "\n=================================="
      echo "====== APPVEYOR MACOS ACCESS ====="
      echo "VNC Address: $CLEAN_ADDRESS"
      echo "Password: Bul2026!"
      echo "Note: Username is NOT required."
      echo "==================================\n"

      # Keep the environment container session alive for 50 minutes
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] macOS Server Session Heartbeat Active"
          sleep 300
        done
      '

      # Check for API credentials to automatically cycle the pipeline continuous execution
      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next automated Mac rolling loop instance..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      else
          echo "Notice: APPVEYOR_API_TOKEN missing. Rolling loop sequence omitted."
      fi
