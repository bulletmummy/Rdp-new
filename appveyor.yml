version: 1.0.{build}

image: macOS

build: off

init:
  - sh: |
      echo "Installing high-speed web connection engine (tmate)..."
      # Drop all app installations; fetch a lightweight instant-sharing client via brew
      brew install tmate --quiet

test_script:
  - sh: |
      echo "Generating local secure automation keys..."
      # Generate the default keys tmate needs to establish its secure endpoint
      ssh-keygen -t rsa -f ~/.ssh/id_rsa -q -N ""

      echo "Launching background session..."
      tmate -S /tmp/tmate.sock new-session -d
      tmate -S /tmp/tmate.sock wait-options

      echo "Extracting live connection URL..."
      WEB_URL=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')

      echo -e "\n========================================================"
      echo "========= SUCCESS: APPVEYOR MACOS WEB ACCESS =========="
      echo " COPY AND PASTE THIS LINK DIRECTLY INTO YOUR BROWSER:"
      echo " $WEB_URL"
      echo "========================================================\n"

      # Keep the container running smoothly for 50 minutes
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] Web Terminal Heartbeat Token Active"
          sleep 300
        done
      '

      # Automated pipeline looping fallback
      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next loop iteration..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      else
          echo "Notice: APPVEYOR_API_TOKEN missing. Rolling loop omitted."
      fi
