# ═══════════════════════════════════════════════════════════
# 🔥 BULLET APPVEYOR MACOS CONFIGURATION 🔥
# Free macOS VM | Remote Desktop | 24/7 Access
# ═══════════════════════════════════════════════════════════

# AppVeyor Configuration
version: 1.0.{build}
image: macOS

# Environment variables
environment:
  NGROK_TOKEN:
    secure: YOUR_ENCRYPTED_NGROK_TOKEN_HERE
  VNC_PASSWORD: Bullet@123
  USER_PASSWORD: Bullet@123

# Install phase
install:
  # Update system
  - brew update

  # Install VNC server
  - brew install --cask tigervnc-viewer || true
  
  # Install ngrok for remote access
  - brew install --cask ngrok || curl -s https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-darwin-amd64.zip -o ngrok.zip && unzip ngrok.zip && sudo mv ngrok /usr/local/bin/

  # Setup ngrok
  - ngrok authtoken $NGROK_TOKEN

  # Install Chrome/Firefox for automation
  - brew install --cask google-chrome firefox

  # Install Python (for scripts)
  - brew install python@3.11

  # Install Node.js (for bots)
  - brew install node

# Build phase
build_script:
  # Enable VNC
  - sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all

  # Set VNC password
  - echo $VNC_PASSWORD | /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw $VNC_PASSWORD

  # Create user account
  - sudo dscl . -create /Users/bullet
  - sudo dscl . -create /Users/bullet UserShell /bin/bash
  - sudo dscl . -create /Users/bullet RealName "Bullet User"
  - sudo dscl . -create /Users/bullet UniqueID 1001
  - sudo dscl . -create /Users/bullet PrimaryGroupID 1000
  - sudo dscl . -create /Users/bullet NFSHomeDirectory /Users/bullet
  - sudo dscl . -passwd /Users/bullet $USER_PASSWORD
  - sudo dscl . -append /Groups/admin GroupMembership bullet

  # Start VNC server
  - sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent

  # Start ngrok tunnel
  - ngrok tcp 5900 --log=stdout > ngrok.log 2>&1 &
  - sleep 5

  # Get ngrok connection details
  - curl -s http://localhost:4040/api/tunnels | grep -o 'tcp://[^"]*'

# Keep alive
test_script:
  # Display connection info
  - echo "==================================="
  - echo "🔥 BULLET MACOS VNC READY 🔥"
  - echo "==================================="
  - curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; data = json.load(sys.stdin); print('VNC Address:', data['tunnels'][0]['public_url'].replace('tcp://', '')) if data.get('tunnels') else print('Getting tunnel...')"
  - echo "Username: bullet"
  - echo "Password: $USER_PASSWORD"
  - echo "VNC Password: $VNC_PASSWORD"
  - echo "==================================="

  # Keep running (6 hours max on free tier)
  - sleep 21600

# Artifacts (optional - save logs)
artifacts:
  - path: ngrok.log
    name: ngrok_tunnel_log

