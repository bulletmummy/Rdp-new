# ═══════════════════════════════════════════════════════════
# 🔥 BULLET APPVEYOR MACOS CONFIGURATION 🔥
# Free macOS VM | Automated Authentication Bypass | 24/7
# ═══════════════════════════════════════════════════════════

version: 1.0.{build}
image: macOS

build: off

environment:
  NGROK_TOKEN:
    secure: YOUR_ENCRYPTED_NGROK_TOKEN_HERE
  VNC_PASSWORD: Bullet@123

install:
  - sh: |
      echo "=== STEP 1: DOWNLOADING NGROK BINARY ==="
      curl -Lk "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.zip" -o ngrok.zip
      unzip -q ngrok.zip
      chmod +x ngrok
      sudo mv ngrok /usr/local/bin/
      rm -f ngrok.zip

      if [ ! -z "$NGROK_TOKEN" ]; then
          ngrok config add-authtoken "$NGROK_TOKEN"
      fi

build_script:
  - sh: |
      echo "=== STEP 2: CREATING EXPLICIT AUTHENTICATION BACKEND ==="
      # Create a dedicated account matching your alias to catch the credential handshake cleanly
      sudo dscl . -create /Users/bullet || true
      sudo dscl . -create /Users/bullet UserShell /bin/bash
      sudo dscl . -create /Users/bullet RealName "Bullet User"
      sudo dscl . -create /Users/bullet UniqueID 1001
      sudo dscl . -create /Users/bullet PrimaryGroupID 20
      sudo dscl . -create /Users/bullet NFSHomeDirectory /Users/bullet
      sudo dscl . -passwd /Users/bullet "$VNC_PASSWORD"
      sudo dscl . -append /Groups/admin GroupMembership bullet

  - sh: |
      echo "=== STEP 3: ACTIVATING COMPATIBLE SCREEN SHARING ENGINE ==="
      # Clear old remote management state variables entirely
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -deactivate -stop || true
      
      # Force access controls open for all local directory profiles explicitly
      sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStart -bool true
      sudo defaults write /Library/Preferences/com.apple.RemoteManagement ARD_AllLocalUsers -bool true
      
      # Set legacy encryption parameters matching mobile/desktop VNC viewer handshakes
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -configure -clientopts -setvnclegacy yes -setvncpw yes -vncpw "$VNC_PASSWORD"
      
      # Authorize permissions across the entire directory node structure
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -configure -access -on -privs -all
      
      # Restart the daemon processing pipeline 
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -activate -restart -agent

  - sh: |
      echo "=== STEP 4: ESTABLISHING NETWORK TUNNEL ==="
      nohup ngrok tcp 5900 --log=stdout > ngrok.log 2>&1 &
      sleep 10

test_script:
  - sh: |
      echo "========================================================"
      echo "🔥 BULLET MACOS CONFIGURATION OPERATIONAL 🔥"
      echo "========================================================"
      
      PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'tcp://[^"]*' | sed 's/tcp:\/\///')
      
      if [ -z "$PUBLIC_URL" ]; then
          echo "Address: Port binding lookup failure. Verify your NGROK_TOKEN variable context."
      else
          echo "VNC Address: $PUBLIC_URL"
      fi
      
      echo "Username:    bullet"
      echo "Password:    $VNC_PASSWORD"
      echo "--------------------------------------------------------"
      echo "⚠️ IMPORTANT FIX FOR YOUR ERROR:"
      echo "Inside RealVNC/Viewer app, you MUST enter:"
      echo "User Name = bullet"
      echo "Password  = $VNC_PASSWORD"
      echo "========================================================\n"

      echo "=== KEEPALIVE LOOP ACTIVE ==="
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] Session Active - Remote Access Gateway Clear"
          sleep 300
        done
      '
