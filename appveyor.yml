version: 1.0.{build}

# Explicitly sets the build image to macOS
image: macOS

build: off

environment:
  # The password must be between 6 to 8 characters long for standard VNC
  VNC_PASS: "Bul2026!"

init:
  - sh: |
      echo "Configuring macOS Screen Sharing (VNC)..."
      # Enable the native remote management and screen sharing preference keys
      sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStart 1
      
      # Configure legacy password authentication explicitly matching the kickstart binary specifications
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -configure -clientopts -setvnclegacy yes -setvncpw yes -vncpw $VNC_PASS
      
      # Provision explicit desktop permissions for the local account and the root admin layer
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -configure -access -on -privs -all -users appveyor,root
      
      # Force a restart of the background Apple Remote Desktop agent to apply permissions
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -activate -restart -agent

  - sh: |
      echo "Downloading and Configuring ngrok for Mac..."
      # Pull the stable macOS 64-bit release build of the ngrok agent binary
      curl -Lk "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.zip" -o ngrok.zip
      unzip ngrok.zip
      chmod +x ngrok
      sudo mv ngrok /usr/local/bin/
      rm ngrok.zip
      
      if [ ! -z "$NGROK_AUTHTOKEN" ]; then
          ngrok config add-authtoken $NGROK_AUTHTOKEN
      else
          echo "Warning: NGROK_AUTHTOKEN variable is blank. Add your token in the web Environment settings."
      fi

test_script:
  - sh: |
      echo "Launching background ngrok VNC Tunnel..."
      # Run the tunnel on TCP port 5900 (the core listener port for macOS VNC)
      ngrok tcp 5900 --log=stdout > /dev/null &
      sleep 7

      echo "Fetching macOS Connection Details..."
      PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'tcp://[^"]*')
      
      if [ -z "$PUBLIC_URL" ]; then
          echo "Error: Failed to retrieve ngrok tunnel link. Verify your NGROK_AUTHTOKEN settings."
          exit 1
      fi
      
      CLEAN_ADDRESS=$(echo $PUBLIC_URL | sed 's/tcp:\/\///')
      
      echo -e "\n=================================="
      echo "====== APPVEYOR MACOS ACCESS ====="
      echo "VNC Address: $CLEAN_ADDRESS"
      echo "Username: appveyor"
      echo "Password: $VNC_PASS"
      echo "==================================\n"

      # Keep the cloud runner shell context alive for 50 minutes
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] macOS Server Session Heartbeat Active"
          sleep 300
        done
      '

      # Automatically chain-trigger the next execution pass to build a rolling sequence
      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next automated Mac pipeline loop entry..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      else
          echo "Notice: APPVEYOR_API_TOKEN missing. Automated looping skipped."
      fi
