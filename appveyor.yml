# ═══════════════════════════════════════════════════════════
# 🔥 BULLET APPVEYOR MACOS CONFIGURATION (LAG-FREE ANYDESK) 🔥
# Optimized Remote Desktop | Low-Latency Streaming | 24/7
# ═══════════════════════════════════════════════════════════

version: 1.0.{build}
image: macOS

build: off

environment:
  USER_PASSWORD: Bullet@123

install:
  - sh: |
      echo "=== STEP 1: INSTALLING ANYDESK VIA COMMAND LINE ==="
      # Use brew cask to pull down a verified installation bundle cleanly
      brew install --cask anydesk --quiet

  - sh: |
      echo "=== STEP 2: CONFIGURING UNATTENDED SECURITY AND LOW-LAG SETTINGS ==="
      # Set up your permanent connection password natively
      echo "Bul2026!" | sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --set-password

      # Inject performance tweaks into the system preferences to optimize transmission speed
      sudo defaults write com.philandro.anydesk-global transmission_mode -int 2
      sudo defaults write com.philandro.anydesk-global view_mode -int 1
      sudo defaults write com.philandro.anydesk-global show_remote_cursor -bool false

      echo "Starting optimized AnyDesk background service..."
      sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --service &
      sleep 15

build_script:
  - sh: |
      echo "=== STEP 3: CREATING USER ACCOUNT PROFILE ==="
      # Provision a dedicated system account to handle GUI desktop loading spaces cleanly
      sudo dscl . -create /Users/bullet || true
      sudo dscl . -create /Users/bullet UserShell /bin/bash
      sudo dscl . -create /Users/bullet RealName "Bullet User"
      sudo dscl . -create /Users/bullet UniqueID 1001
      sudo dscl . -create /Users/bullet PrimaryGroupID 20
      sudo dscl . -create /Users/bullet NFSHomeDirectory /Users/bullet
      sudo dscl . -passwd /Users/bullet "$USER_PASSWORD"
      sudo dscl . -append /Groups/admin GroupMembership bullet

test_script:
  - sh: |
      echo "=== STEP 4: FETCHING CONNECTION IDENTIFIER ==="
      ANYDESK_ID=$(sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id 2>/dev/null)
      
      if [ -z "$ANYDESK_ID" ] || [ "$ANYDESK_ID" == "0" ]; then
          echo "Retrying ID generation window pass..."
          sleep 15
          ANYDESK_ID=$(sudo /Applications/AnyDesk.app/Contents/MacOS/AnyDesk --get-id 2>/dev/null)
      fi

      echo -e "\n=========================================="
      echo "======= APPVEYOR ANYDESK ACCESS ========"
      echo " AnyDesk ID: $ANYDESK_ID"
      echo " Password:   Bul2026!"
      echo "==========================================\n"

      echo "=== STEP 5: PROCEEDING TO RUN KEEPALIVE LOOP ==="
      timeout 50m sh -c '
        while true; do
          echo "[$(date)] AnyDesk Connection Session Engine Active"
          sleep 300
        done
      '

      if [ ! -z "$APPVEYOR_API_TOKEN" ]; then
          echo "Triggering next automated pipeline loop entry sequence..."
          curl -s -X POST "https://ci.appveyor.com/api/builds" \
            -H "Authorization: Bearer $APPVEYOR_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"accountName\":\"$APPVEYOR_ACCOUNT_NAME\",\"projectSlug\":\"$APPVEYOR_PROJECT_SLUG\",\"branch\":\"$APPVEYOR_REPO_BRANCH\"}"
      fi
